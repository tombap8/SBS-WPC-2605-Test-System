<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCS 평가 시스템</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            max-width: 800px;
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1, h2 {
            background-color: #85bc0d;
            color: white;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            font-size: 2em;
        }
        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            list-style: none;
            padding: 0;
        }
        .links li {
            margin: 10px 0;
        }
        .links a {
            display: inline-block;
            padding: 15px 30px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .links a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>훈련기관 : SBS아카데미컴퓨터아트학원_종로</h1>
        <h2>과 정 명 : (스마트웹&콘텐츠개발) UIUX 웹디자인 (웹퍼블리셔) 양성과정</h2>
        <h3>&lt;평가 바로 가기&gt;</h3>
        <ul class="links">
            <li><a href="#" onclick="window.open('./001/', '_blank')">01. 스마트문화앱 개발환경구축</a></li>
            <li><a href="#" onclick="window.open('./002/', '_blank')">02. UIUX 요구 분석</a></li>
            <li><a href="#" onclick="window.open('./003/', '_blank')">03. UIUX 콘셉트 기획</a></li>
            <li><a href="#" onclick="window.open('./004/', '_blank')">04. UI 디자인</a></li>
            <li><a href="#" onclick="window.open('./005/', '_blank')">05. UI 구현</a></li>
        </ul>
    </div>
</body>
</html>
